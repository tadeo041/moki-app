<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button
        defaultHref="/buscador-motos"
        text="">
      </ion-back-button>
    </ion-buttons>

    <ion-title>
      Proceso de rentar moto
    </ion-title>

  </ion-toolbar>
</ion-header>

<ion-content
  class="proceso-content"
  *ngIf="moto">

  <div class="moto-img">

    <img
      [src]="moto.imageUrl"
      [alt]="moto.name">

    <ion-badge class="badge-disponible">
      Disponible
    </ion-badge>

  </div>

  <div class="moto-header">
    <h2>{{ moto.name }}</h2>

    <span class="precio">
      ${{ moto.pricePerHour }}/hora
    </span>
  </div>

  <div class="seccion">

    <h3 class="seccion-titulo">
      Datos de la renta
    </h3>

    <div class="fechas-row">

      <div class="fecha-campo">
        <label>Fecha inicio*</label>

        <input
          type="date"
          [(ngModel)]="fechaInicio">
      </div>

      <div class="fecha-campo">
        <label>Fecha final*</label>

        <input
          type="date"
          [(ngModel)]="fechaFin">
      </div>

    </div>

    <div class="dias-renta">
      <span>{{ diasRenta }} días de renta</span>
    </div>

  </div>

  <div class="seccion">

    <h3 class="seccion-titulo">
      Servicios adicionales
    </h3>

    <label class="check-item">
      <ion-checkbox
        [(ngModel)]="servicios.kitSeguridad">
      </ion-checkbox>

      <span>
        Kit de seguridad
      </span>
    </label>

    <label class="check-item">
      <ion-checkbox
        [(ngModel)]="servicios.seguroBasico">
      </ion-checkbox>

      <span>
        Seguro básico
      </span>
    </label>

    <label class="check-item">
      <ion-checkbox
        [(ngModel)]="servicios.entregaDomicilio">
      </ion-checkbox>

      <span>
        Entrega a domicilio
      </span>
    </label>

  </div>

  <div class="seccion">

    <h3 class="seccion-titulo">
      Método de pago
    </h3>

    <div class="campo-tarjeta">

      <label>
        Nombre de la tarjeta
      </label>

      <input
        type="text"
        [(ngModel)]="nombreTarjeta">

    </div>

  </div>

</ion-content>

<div
  class="footer-btn"
  *ngIf="moto">

  <ion-button
    expand="block"
    class="btn-continuar"
    (click)="continuar()">

    Continuar

  </ion-button>

</div>
